---
- hosts: masters
  become: yes
  
  tasks:
    - name: Set master_hostname variable
      ansible.builtin.lineinfile:
        path: /vagrant/ansible/hadoop/playbooks/vars/main.yml
        regexp: '^master_hostname:'
        line: 'master_hostname: {{ master_hostname }}'
        backrefs: yes

    - name: Set nfs_server variable
      ansible.builtin.lineinfile:
        path: /vagrant/ansible/nfs/playbooks/vars/main.yml
        regexp: '^nfs_server:'
        line: 'nfs_server: {{ master_hostname }}'
        backrefs: yes

    - name: Set cluster_network variable
      ansible.builtin.lineinfile:
        path: /vagrant/ansible/nfs/playbooks/vars/main.yml
        regexp: '^cluster_network:'
        line: "cluster_network: {{ (master_ip + '/24') | ansible.utils.ipaddr('network/prefix') }}"
        backrefs: yes

    - name: Set worker_cores variable
      ansible.builtin.lineinfile:
        path: /vagrant/ansible/hadoop/playbooks/vars/main.yml
        regexp: '^worker_cores:'
        line: 'worker_cores: {{ worker_cores }}'
        backrefs: yes

    - name: Set num_workers variable
      ansible.builtin.lineinfile:
        path: /vagrant/ansible/hadoop/playbooks/vars/main.yml
        regexp: '^num_workers:'
        line: 'num_workers: {{ num_workers }}'
        backrefs: yes

    - name: Generate workers file
      ansible.builtin.copy:
        dest: /vagrant/ansible/hadoop/playbooks/templates/workers
        content: |
          # Fichero generado automáticamente
          {% for host in groups['workers'] %}
          {{ host }}
          {% endfor %}

    - name: Install Python packages
      ansible.builtin.package:
        name:
          - python3-pip
          - python3-matplotlib
          - python3-pandas
        state: present
        update_cache: yes

    - name: Install Parquet engine
      ansible.builtin.pip:
        name: pyarrow
        executable: pip3
        extra_args: --break-system-packages

- hosts: cluster
  become: yes

  vars:
    list_of_packages: 
      - vim
      - nano
      - curl
      - sshpass
      - unzip
      - python3-apt
      - dnsutils
      - dos2unix
      - gnupg
      - whois

  tasks:      
    - name: Install basic software
      ansible.builtin.package:
        name: "{{ list_of_packages }}"
        state: present
        update_cache: yes
