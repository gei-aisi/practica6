# DO NOT modify this file. Missing values are automatically configured
#
# Hostname of the master node
master_hostname: xxx

# Worker settings
worker_cores: xxx
num_workers: xxx

# JAVA_HOME
java_home: /usr/lib/jvm/java-21-openjdk-amd64

# The directory into which Hadoop and Spark distributions will be download
download_dir: /share/nfs

# Hadoop version to download
hadoop_version: 3.5.0

# URL for downloading the Hadoop distribution
hadoop_url: "https://dlcdn.apache.org/hadoop/common/hadoop-{{ hadoop_version }}/hadoop-{{ hadoop_version }}.tar.gz"

# Checksum for the Hadoop distribution
hadoop_checksum: sha512:04ab94496cc00c8b7a28d03f6308eff8d2a4e7f37a9da5e8e086e4d6fc990e7a94d661908f6a6136039536efb362614b8aecdef185b5fb8ed588f0b152c7aa16

# The directory into which Hadoop will be installed on the master node
hadoop_dir: "{{ download_dir }}/hadoop"

# Hadoop home
hadoop_home: "{{ hadoop_dir }}/hadoop-{{ hadoop_version }}"

# Hadoop configuration directory
hadoop_conf_dir: "{{ hadoop_home }}/etc/hadoop"

# The directory into which Hadoop will store its data
hadoop_data_dir: hadoop-data

# Encrypted password for hadoop user
hadoop_user_passwd: $y$j9T$gUSfSDnzBPbSlUuraKs6U/$LjnAbHUs1yIj7EMCFzNgmF2DBQDA6BK04pq2o0YK1e/

# Spark version to download
spark_version: 4.1.1

# URL for downloading the Spark distribution
spark_url: "https://dlcdn.apache.org/spark/spark-{{ spark_version }}/spark-{{ spark_version }}-bin-hadoop3.tgz"

# Checksum for the Spark distribution
spark_checksum: sha512:9f39e588e7d4c70ec0126109679f386eb9bfa26979dc42669fe4f3e3446a082dca8ffbf5e8dbe8ad411cf2ce5bf803ce670341620bf52d968067acf86626106e

# The directory into which Spark will be installed on the master node
spark_dir: "{{ download_dir }}/spark"

# Spark home
spark_home: "{{ spark_dir }}/spark-{{ spark_version }}-bin-hadoop3"

# Spark configuration directory
spark_conf_dir: "{{ spark_home }}/conf"

# The directory into which spark will store its data
spark_data_dir: spark-data
