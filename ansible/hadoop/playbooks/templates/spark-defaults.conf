# Default system properties included when running spark-submit.
# This is useful for setting default environmental settings.

spark.yarn.am.memory		 128m
spark.yarn.am.cores		 1
spark.executor.instances	 {{ num_workers }}
spark.executor.cores    	 {{ worker_cores }}
spark.executor.memory   	 512m
spark.driver.memory   		 512m
spark.yarn.am.extraJavaOptions	 -Djava.io.tmpdir=/data/disk0/{{ spark_data_dir }}
spark.executor.extraJavaOptions	 -Djava.io.tmpdir=/data/disk0/{{ spark_data_dir }}
spark.local.dir			 /data/disk0/{{ spark_data_dir }}
spark.shuffle.compress		 true
spark.shuffle.spill.compress	 true
spark.broadcast.compress	 true
spark.speculation		 false
spark.memory.fraction		 0.7
spark.network.timeout 		 60s
spark.executor.heartbeatInterval 30s
